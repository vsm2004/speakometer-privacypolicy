<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0F0B1F; --card: rgba(255, 255, 255, 0.05); --danger: #EF4444; --text: #F8FAFC; --text-dim: #94A3B8; }

        .btn-delete { background: var(--danger); color: white; padding: 14px 28px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Delete Account</h1>
        <p>Removing your account will permanently delete your speech metrics and history from our local records.</p>
